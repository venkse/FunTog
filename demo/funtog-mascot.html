<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FunTog · moods</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --plum:#1E1430; --plum-2:#2A1C44; --coral:#FF6F61; --coral-dark:#E8533F;
    --flame-1:#FFD66B; --flame-2:#FF8A3D; --spark:#FFE08A; --blush:#FF9E8A;
    --cream:#F6ECD9; --muted:#B9A7C9; --ink:#23163B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 90% at 50% 8%, #34225A 0%, var(--plum) 55%, #160E26 100%);
    color:var(--cream); font-family:"Nunito",system-ui,sans-serif;
    min-height:100%; display:flex; flex-direction:column; align-items:center;
    padding:32px 20px 56px; gap:18px;
  }
  .eyebrow{font-family:"Nunito";font-weight:700;letter-spacing:.28em;text-transform:uppercase;
    font-size:.72rem;color:var(--muted)}
  h1{font-family:"Fredoka";font-weight:700;font-size:clamp(1.9rem,5vw,2.9rem);margin:.1em 0 0;
    color:var(--cream);letter-spacing:.01em}
  h1 b{color:var(--coral)}
  .sub{color:var(--muted);font-size:.95rem;max-width:46ch;text-align:center;line-height:1.5;margin:0}

  .stage{
    margin-top:6px; width:min(420px,86vw); aspect-ratio:1/1;
    background:radial-gradient(60% 55% at 50% 62%, rgba(255,138,61,.16), transparent 70%);
    display:grid; place-items:center; position:relative;
  }
  /* soft floor shadow */
  .stage::after{content:"";position:absolute;bottom:14%;width:46%;height:7%;border-radius:50%;
    background:rgba(0,0,0,.35);filter:blur(7px);animation:shadowPulse 2.4s ease-in-out infinite}

  svg{width:78%;height:auto;overflow:visible}
  /* groups pivot from their own box */
  #funtog,#flame,.brow,.arm,.eyelid,.pupil,#mouthGroup,.cheek,#sparkles,#thoughts{
    transform-box:fill-box; transform-origin:center;
  }
  #funtog{animation:bob 2.6s ease-in-out infinite}
  #flame{transform-origin:bottom center;animation:flicker .7s ease-in-out infinite alternate}
  .eyelid{transform-origin:center; transform:scaleY(0)} /* open by default */
  .blinker{animation:blink 4.2s ease-in-out infinite}

  /* mouths: show one per mood */
  .mouth{opacity:0;transition:opacity .12s}
  #mouthSmile{opacity:1}

  /* ---------- MOODS ---------- */
  /* idle = defaults */

  .mood-plotting #funtog{animation:lean 2.2s ease-in-out infinite}
  .mood-plotting .brow{transform:translateY(3px) rotate(8deg)}
  .mood-plotting #browR{transform:translateY(3px) rotate(-8deg)}
  .mood-plotting #armL{animation:rubL .32s ease-in-out infinite}
  .mood-plotting #armR{animation:rubR .32s ease-in-out infinite}
  .mood-plotting #mouthSmile{opacity:0}
  .mood-plotting #mouthSmirk{opacity:1}

  .mood-thinking #funtog{animation:bob 3s ease-in-out infinite}
  .mood-thinking .pupil{transform:translateY(-3px) translateX(2px)}
  .mood-thinking #browL{transform:translateY(-1px) rotate(-6deg)}
  .mood-thinking #armR{transform:rotate(-58deg) translate(-6px,-30px)} /* to chin */
  .mood-thinking #mouthSmile{opacity:0}
  .mood-thinking #mouthFlat{opacity:1}
  .mood-thinking #thoughts{animation:think 2.6s ease-in-out infinite}

  .mood-mischief #funtog{animation:bob 2.6s ease-in-out infinite}
  .mood-mischief .brow{animation:wiggle .5s ease-in-out infinite}
  .mood-mischief .pupil{transform:translateX(3px)}
  .mood-mischief #mouthSmile{opacity:0}
  .mood-mischief #mouthSmirk{opacity:1}

  .mood-smug #funtog{transform:rotate(-5deg);animation:none}
  .mood-smug .eyelid{transform:scaleY(.55)} /* half-lidded */
  .mood-smug .brow{transform:translateY(-2px)}
  .mood-smug #mouthSmile{opacity:0}
  .mood-smug #mouthSmirk{opacity:1}
  .mood-smug #armL{transform:rotate(20deg) translate(4px,2px)}

  .mood-wink #eyelidR{transform:scaleY(1)} /* right eye closed */
  .mood-wink #funtog{animation:tilt 1.1s ease-in-out}
  .mood-wink #mouthSmile{opacity:0}
  .mood-wink #mouthGrin{opacity:1}
  .mood-wink #sparkles{animation:spark 1.1s ease-out}

  .mood-tada #funtog{animation:jump 1s cubic-bezier(.3,1.4,.5,1)}
  .mood-tada .arm{animation:armsUp 1s ease-out}
  .mood-tada #mouthSmile{opacity:0}
  .mood-tada #mouthOpen{opacity:1}
  .mood-tada #sparkles{animation:spark 1s ease-out}

  .mood-cheer #funtog{animation:bob 1.4s ease-in-out infinite}
  .mood-cheer #armR{animation:pump .5s ease-in-out infinite}
  .mood-cheer #mouthSmile{opacity:0}
  .mood-cheer #mouthOpen{opacity:1}
  .mood-cheer #sparkles{animation:spark 1.4s ease-out infinite}

  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes lean{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(2px) rotate(3deg)}}
  @keyframes tilt{0%{transform:rotate(0)}40%{transform:rotate(-7deg)}100%{transform:rotate(0)}}
  @keyframes jump{0%{transform:translateY(0) scaleY(.9) scaleX(1.08)}30%{transform:translateY(-46px) scaleY(1.12) scaleX(.94)}60%{transform:translateY(0) scaleY(.86) scaleX(1.12)}100%{transform:translateY(0) scale(1)}}
  @keyframes flicker{0%{transform:scaleY(1) skewX(0)}100%{transform:scaleY(1.12) skewX(-5deg)}}
  @keyframes blink{0%,92%,100%{transform:scaleY(0)}95%{transform:scaleY(1)}}
  @keyframes rubL{0%,100%{transform:translateX(0) rotate(8deg)}50%{transform:translateX(4px) rotate(2deg)}}
  @keyframes rubR{0%,100%{transform:translateX(0) rotate(-8deg)}50%{transform:translateX(-4px) rotate(-2deg)}}
  @keyframes wiggle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px) rotate(-6deg)}}
  @keyframes armsUp{0%{transform:rotate(0)}40%,100%{transform:rotate(-46deg) translateY(-10px)}}
  @keyframes pump{0%,100%{transform:rotate(-40deg) translateY(-6px)}50%{transform:rotate(-70deg) translateY(-16px)}}
  @keyframes think{0%,100%{opacity:0;transform:translateY(4px) scale(.7)}50%{opacity:1;transform:translateY(-2px) scale(1)}}
  @keyframes spark{0%{opacity:0;transform:scale(.4)}30%{opacity:1}100%{opacity:0;transform:scale(1.5)}}
  @keyframes shadowPulse{0%,100%{transform:scaleX(1);opacity:.35}50%{transform:scaleX(.82);opacity:.5}}

  .caption{font-family:"Fredoka";font-weight:600;font-size:1.15rem;color:var(--cream);min-height:1.4em}
  .caption span{color:var(--coral)}
  .map{color:var(--muted);font-size:.82rem;font-family:"Nunito"}
  .map code{color:var(--spark);font-weight:700}

  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px}
  button{font-family:"Fredoka";font-weight:600;font-size:.9rem;color:var(--cream);
    background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.14);border-radius:999px;
    padding:8px 16px;cursor:pointer;transition:transform .08s,border-color .15s,background .15s}
  button:hover{border-color:var(--coral);background:rgba(255,111,97,.14)}
  button:active{transform:translateY(1px)}
  button.on{background:var(--coral);border-color:var(--coral);color:#2A0E0A}
  button:focus-visible{outline:3px solid var(--spark);outline-offset:2px}
  .play{background:linear-gradient(180deg,var(--flame-1),var(--flame-2));border-color:transparent;color:#3a1c00}
  .play:hover{filter:brightness(1.05)}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important}
    #funtog{transform:none !important}
  }
</style>
</head>
<body>
  <p class="eyebrow">Character Engine · sprite map</p>
  <h1>Meet <b>FunTog</b></h1>
  <p class="sub">The cheeky friend who actually plans the night. The engine emits a <em>mood</em>; the client plays the matching animation. Tap a mood — or run a whole night.</p>

  <div class="stage" aria-hidden="true">
    <svg id="sprite" viewBox="0 0 240 250" class="mood-idle" role="img" aria-label="FunTog mascot">
      <defs>
        <radialGradient id="bodyG" cx="42%" cy="34%" r="75%">
          <stop offset="0%" stop-color="#FF8676"/><stop offset="60%" stop-color="#FF6F61"/><stop offset="100%" stop-color="#E8533F"/>
        </radialGradient>
        <linearGradient id="flameG" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#FF8A3D"/><stop offset="55%" stop-color="#FFC24B"/><stop offset="100%" stop-color="#FFE08A"/>
        </linearGradient>
      </defs>

      <g id="funtog">
        <!-- flame tuft -->
        <g id="flame">
          <path d="M120 8 C133 30 128 44 120 52 C112 44 107 30 120 8 Z" fill="url(#flameG)"/>
          <circle cx="120" cy="40" r="5" fill="#FFF2C2" opacity=".85"/>
        </g>

        <!-- arms (behind body) -->
        <g class="arm" id="armL"><rect x="40" y="150" width="30" height="13" rx="6.5" fill="#E8533F"/></g>
        <g class="arm" id="armR"><rect x="170" y="150" width="30" height="13" rx="6.5" fill="#E8533F"/></g>

        <!-- body -->
        <path id="body" d="M120 52 C176 52 196 96 196 142 C196 196 164 226 120 226 C76 226 44 196 44 142 C44 96 64 52 120 52 Z" fill="url(#bodyG)"/>

        <!-- cheeks -->
        <ellipse class="cheek" cx="84" cy="156" rx="13" ry="9" fill="var(--blush)" opacity=".55"/>
        <ellipse class="cheek" cx="156" cy="156" rx="13" ry="9" fill="var(--blush)" opacity=".55"/>

        <!-- brows -->
        <rect class="brow" id="browL" x="78" y="106" width="26" height="7" rx="3.5" fill="#B23A2B"/>
        <rect class="brow" id="browR" x="136" y="106" width="26" height="7" rx="3.5" fill="#B23A2B"/>

        <!-- eyes -->
        <g>
          <ellipse cx="91" cy="130" rx="15" ry="17" fill="#fff"/>
          <circle class="pupil" id="pupilL" cx="93" cy="132" r="7" fill="#23163B"/>
          <circle cx="96" cy="129" r="2.4" fill="#fff"/>
          <rect class="eyelid blinker" id="eyelidL" x="76" y="113" width="30" height="34" rx="15" fill="url(#bodyG)"/>
        </g>
        <g>
          <ellipse cx="149" cy="130" rx="15" ry="17" fill="#fff"/>
          <circle class="pupil" id="pupilR" cx="151" cy="132" r="7" fill="#23163B"/>
          <circle cx="154" cy="129" r="2.4" fill="#fff"/>
          <rect class="eyelid blinker" id="eyelidR" x="134" y="113" width="30" height="34" rx="15" fill="url(#bodyG)"/>
        </g>

        <!-- mouths (one shown per mood) -->
        <g id="mouthGroup">
          <path class="mouth" id="mouthSmile" d="M101 176 Q120 192 139 176" stroke="#7A1E12" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path class="mouth" id="mouthSmirk" d="M104 180 Q124 188 140 174" stroke="#7A1E12" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path class="mouth" id="mouthGrin" d="M100 174 Q120 196 140 174 Z" fill="#7A1E12"/>
          <ellipse class="mouth" id="mouthOpen" cx="120" cy="182" rx="15" ry="13" fill="#7A1E12"/>
          <rect class="mouth" id="mouthFlat" x="106" y="180" width="28" height="6" rx="3" fill="#7A1E12"/>
        </g>

        <!-- sparkles (tada / wink / cheer) -->
        <g id="sparkles" opacity="0">
          <path d="M40 80 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4 z" fill="var(--spark)"/>
          <path d="M196 70 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" fill="var(--flame-1)"/>
          <path d="M186 168 l3 6 6 3 -6 3 -3 6 -3 -6 -6 -3 6 -3 z" fill="var(--spark)"/>
        </g>
        <!-- thought dots (thinking) -->
        <g id="thoughts" opacity="0">
          <circle cx="176" cy="96" r="4" fill="var(--cream)"/>
          <circle cx="188" cy="84" r="6" fill="var(--cream)"/>
          <circle cx="203" cy="70" r="8" fill="var(--cream)"/>
        </g>
      </g>
    </svg>
  </div>

  <div class="caption" id="caption">idle — <span>just vibing</span></div>
  <div class="map" id="map">mood <code>idle</code> → sprite <code>bob</code></div>

  <div class="controls" id="controls"></div>
  <div class="controls"><button class="play" id="playNight">▶ Play a whole night</button></div>

<script>
  // mirrors the persona sprite map in persona-registry.ts (troublemaker pack)
  const MOODS = {
    idle:    { sprite:"bob",            line:"just vibing" },
    plotting:{ sprite:"rub-hands",      line:"cooking up three plans" },
    thinking:{ sprite:"tap-chin",       line:"reading the room" },
    mischief:{ sprite:"eyebrow-wiggle", line:"this one's a little chaotic" },
    smug:    { sprite:"lean-back",      line:"told you it'd work" },
    wink:    { sprite:"wink",           line:"trust me on this" },
    tada:    { sprite:"confetti-jump",  line:"we have a winner!" },
    cheer:   { sprite:"fist-pump",      line:"let's GO" },
  };
  const BURST = new Set(["tada","wink"]); // play once, then settle back to idle
  const sprite = document.getElementById("sprite");
  const caption = document.getElementById("caption");
  const map = document.getElementById("map");
  const controls = document.getElementById("controls");
  let burstTimer;

  function setMood(m){
    clearTimeout(burstTimer);
    sprite.className = "mood-" + m;
    caption.innerHTML = m + " — <span>" + MOODS[m].line + "</span>";
    map.innerHTML = "mood <code>" + m + "</code> → sprite <code>" + MOODS[m].sprite + "</code>";
    [...controls.children].forEach(b => b.classList.toggle("on", b.dataset.m === m));
    if (BURST.has(m)) burstTimer = setTimeout(() => setMood("idle"), 1100);
  }

  Object.keys(MOODS).forEach(m => {
    const b = document.createElement("button");
    b.textContent = m; b.dataset.m = m;
    b.onclick = () => setMood(m);
    controls.appendChild(b);
  });

  // a night, in product order: idle → plotting (reveal) → thinking (converge) → tada (resolved) → cheer
  const NIGHT = [["idle",700],["plotting",2200],["thinking",2200],["tada",1300],["cheer",1800],["idle",1]];
  document.getElementById("playNight").onclick = () => {
    let t = 0;
    NIGHT.forEach(([m, d]) => { setTimeout(() => setMood(m), t); t += d; });
  };

  setMood("idle");
</script>
</body>
</html>
