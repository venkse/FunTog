<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunTog — Choose Your Character</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14091F; --bg2:#1E1430; --card:#2A1C44; --card2:#362356;
    --coral:#FF6F61; --coralD:#E8533F; --gold:#FFC24B; --cream:#F6ECD9; --muted:#B9A7C9; --ink:#23163B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1100px 560px at 50% -8%, #2A1640 0%, var(--bg) 60%);
       color:var(--cream);font-family:'Nunito',sans-serif;min-height:100vh;padding:40px 20px 64px}
  .wrap{max-width:900px;margin:0 auto;text-align:center}
  .kicker{font-family:'Fredoka';font-weight:600;font-size:12.5px;letter-spacing:.28em;color:var(--coral);text-transform:uppercase}
  h1{font-family:'Fredoka';font-weight:700;font-size:clamp(28px,4.4vw,42px);margin:8px 0 10px}
  .sub{color:var(--muted);font-size:15.5px;max-width:640px;margin:0 auto 26px;line-height:1.5}
  .sub em{color:var(--gold);font-style:normal;font-weight:700}

  /* character picker */
  .picker{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
  .pick{background:var(--card);border:2px solid transparent;border-radius:16px;padding:8px 8px 6px;cursor:pointer;
        width:86px;transition:transform .15s, border-color .15s}
  .pick:hover{transform:translateY(-3px)}
  .pick.on{border-color:var(--gold);background:var(--card2)}
  .pick svg{width:58px;height:58px;display:block;margin:0 auto}
  .pick .nm{font-family:'Fredoka';font-weight:600;font-size:12px;margin-top:4px;color:var(--cream)}

  /* stage */
  .stagewrap{position:relative;width:340px;height:340px;margin:0 auto}
  .stage{position:absolute;inset:0;border-radius:28px;
         background:radial-gradient(260px 220px at 50% 44%, rgba(255,111,97,.16), rgba(0,0,0,0) 72%),
                    linear-gradient(180deg,var(--card) 0%, #241740 100%);
         box-shadow:0 16px 44px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
  .rig{display:none;width:280px;height:284px;overflow:visible}
  .rig.show{display:block}
  svg *{transform-box:fill-box}
  .sig-orbit{transform-box:view-box}

  /* fx overlay */
  .fx{position:absolute;inset:0;pointer-events:none;border-radius:28px;overflow:hidden}
  .confetti{position:absolute;width:9px;height:9px;border-radius:2px;opacity:0;top:38%}
  .m-tada .confetti,.m-cheer .confetti{animation:conf 1.15s ease-out infinite}
  .m-cheer .confetti{animation-duration:1.5s}
  @keyframes conf{
    0%{opacity:0;transform:translate(0,0) rotate(0)}
    12%{opacity:1}
    100%{opacity:0;transform:translate(var(--dx),140px) rotate(320deg)}
  }
  .dots{position:absolute;right:16%;top:14%;display:none;gap:6px}
  .m-thinking .dots{display:flex}
  .dots i{width:9px;height:9px;border-radius:50%;background:var(--muted);opacity:.35;animation:dot 1.2s infinite}
  .dots i:nth-child(2){width:12px;height:12px;animation-delay:.2s}
  .dots i:nth-child(3){width:16px;height:16px;animation-delay:.4s}
  @keyframes dot{0%,100%{opacity:.25}50%{opacity:.9}}

  /* caption: the service contract made visible */
  .caption{margin-top:16px;font-size:13px;color:var(--muted)}
  .caption code{background:var(--card);border-radius:8px;padding:3px 9px;color:var(--gold);font-size:12.5px}

  /* mood buttons */
  .moods{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .mood{background:var(--card);color:var(--cream);border:0;border-radius:999px;padding:9px 16px;
        font-family:'Fredoka';font-weight:600;font-size:13.5px;cursor:pointer;transition:background .15s,transform .12s}
  .mood:hover{transform:translateY(-2px)}
  .mood.on{background:var(--coral);color:var(--ink)}
  .controls{margin-top:16px}
  .play{background:var(--gold);color:var(--ink);border:0;border-radius:999px;padding:11px 22px;
        font-family:'Fredoka';font-weight:700;font-size:14.5px;cursor:pointer}
  .play:hover{filter:brightness(1.06)}
  .nightline{margin-top:10px;font-size:13.5px;color:var(--muted);min-height:20px;font-style:italic}

  /* ================= shared "alive" + mood grammar (drives every rig) ================= */
  .breathe{animation:breathe 3.1s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  .lidL,.lidR{transform:scaleY(0);transform-origin:50% 0%;transition:transform .18s}
  .mouth-open,.mouth-flat{opacity:0}
  .mouth-smile{opacity:1}

  /* plotting: narrowed eyes, flat mouth, lean in */
  .m-plotting .lidL,.m-plotting .lidR{transform:scaleY(.42)}
  .m-plotting .mouth-smile{opacity:0}.m-plotting .mouth-flat{opacity:1}
  .m-plotting .rig.show{transform:rotate(-2.5deg)}

  /* thinking: pupils drift up, small o mouth */
  .m-thinking .pupilL,.m-thinking .pupilR{transform:translate(-4px,-6px)}
  .m-thinking .mouth-smile{opacity:0}
  .m-thinking .mouth-open{opacity:1;transform:scale(.62);transform-origin:center}

  /* wink: right lid loops closed */
  .m-wink .lidR{animation:winky 1.6s ease-in-out infinite}
  @keyframes winky{0%,25%,75%,100%{transform:scaleY(0)}40%,60%{transform:scaleY(1)}}
  .m-wink .char-pip .lidR{animation:winky 1.6s ease-in-out infinite}
  .m-wink .char-pip .lidL{animation:none}

  /* mischief: crescent eyes, wide grin, wiggle */
  .m-mischief .lidL,.m-mischief .lidR{transform:scaleY(.5)}
  .m-mischief .mouth-smile{transform:scaleX(1.3);transform-origin:center}
  .m-mischief .rig.show{animation:wiggle 1s ease-in-out infinite}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

  /* smug: half lids, lean back */
  .m-smug .lidL,.m-smug .lidR{transform:scaleY(.58)}
  .m-smug .rig.show{transform:rotate(3.5deg) translateY(2px)}

  /* tada: jump + open mouth (+ confetti via .fx) */
  .m-tada .rig.show{animation:jump .8s cubic-bezier(.3,1.6,.5,1) infinite}
  @keyframes jump{0%,100%{transform:translateY(0)}45%{transform:translateY(-22px)}}
  .m-tada .mouth-smile{opacity:0}.m-tada .mouth-open{opacity:1}

  /* cheer: fast bounce, arms up, open mouth */
  .m-cheer .rig.show{animation:bounce .55s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .m-cheer .armL{transform:rotate(-42deg)}
  .m-cheer .armR{transform:rotate(42deg)}
  .armL{transform-origin:80% 20%;transition:transform .2s}
  .armR{transform-origin:20% 20%;transition:transform .2s}
  .m-cheer .mouth-smile{opacity:0}.m-cheer .mouth-open{opacity:1}

  /* ================= character signatures (always alive) ================= */
  .sig-boing{animation:boing 2.6s ease-in-out infinite;transform-origin:50% 100%}
  @keyframes boing{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(11deg)}}
  .m-plotting .char-momo .sig-boing{animation-duration:5.5s;opacity:.6}          /* star-charge (dims) */

  .sig-flame{animation:flick 1.5s ease-in-out infinite;transform-origin:50% 100%}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.1,1.18) rotate(2deg)}}

  .char-pip .lidL,.char-pip .lidR{animation:slowblink 4.4s infinite}             /* slow-blink idle */
  @keyframes slowblink{0%,92%,100%{transform:scaleY(0)}95%,97%{transform:scaleY(1)}}
  .m-plotting .char-pip .lidL,.m-plotting .char-pip .lidR,
  .m-mischief .char-pip .lidL,.m-mischief .char-pip .lidR,
  .m-smug .char-pip .lidL,.m-smug .char-pip .lidR{animation:none}

  .sig-glow{animation:glow 2.2s ease-in-out infinite;transform-origin:center}
  @keyframes glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.16)}}
  .m-tada .char-lumi .sig-glow{animation:shine .7s ease-in-out infinite}          /* full-shine */
  @keyframes shine{0%,100%{opacity:.9;transform:scale(1.25)}50%{opacity:1;transform:scale(1.6)}}
  .m-thinking .char-lumi .sig-glow{animation-duration:4.5s;opacity:.35}           /* dim-hover */

  .sig-wingL{animation:flapL 1.1s ease-in-out infinite;transform-origin:90% 80%}
  .sig-wingR{animation:flapR 1.1s ease-in-out infinite;transform-origin:10% 80%}
  @keyframes flapL{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-14deg)}}
  @keyframes flapR{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(14deg)}}

  .char-boo.show{animation:floaty 3.6s ease-in-out infinite}                       /* float idle */
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .m-mischief .char-boo.show{animation:vanish 1.6s ease-in-out infinite}           /* vanish-reappear */
  @keyframes vanish{0%,100%{opacity:1}50%{opacity:.25}}
  .sig-twinkle{animation:twinkle 1.4s ease-in-out infinite;transform-origin:center}
  @keyframes twinkle{0%,100%{opacity:.5;transform:scale(.8) rotate(0)}50%{opacity:1;transform:scale(1.25) rotate(24deg)}}

  .sig-orbit{animation:orbit 14s linear infinite;transform-origin:120px 128px}
  @keyframes orbit{to{transform:rotate(360deg)}}
  .m-tada .char-dizzy .sig-orbit{animation-duration:1.6s}                          /* strobe-burst */
  .m-cheer .char-dizzy .sig-orbit{animation-duration:3s}                           /* spin-up */

  .sig-tail{animation:sway 2.8s ease-in-out infinite;transform-origin:10% 90%}
  @keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(8deg)}}
  .m-plotting .char-koko .sig-tail{animation:none;transform:rotate(2deg)}          /* tail-question: holds the ? */

  @media (prefers-reduced-motion:reduce){
    .breathe,.rig.show,.lidL,.lidR,.sig-boing,.sig-flame,.sig-glow,.sig-wingL,.sig-wingR,
    .sig-twinkle,.sig-orbit,.sig-tail,.confetti,.dots i,.char-boo.show,.char-pip .lidL,.char-pip .lidR
    {animation:none !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Character Engine · persona picker</div>
  <h1>Choose your FunTog</h1>
  <p class="sub">Every character is a registered <em>persona pack</em>: same eight-mood vocabulary, its own animation
  language. The engine emits a mood; the client plays that persona's sprite. Pick a friend, poke its moods.</p>

  <div class="picker" id="picker"></div>

  <div class="stagewrap">
    <div class="stage" id="stage"></div>
    <div class="fx" id="fx"><div class="dots"><i></i><i></i><i></i></div></div>
  </div>

  <div class="caption" id="caption"></div>
  <div class="moods" id="moods"></div>
  <div class="controls"><button class="play" id="playNight">▶ Play a whole night</button></div>
  <div class="nightline" id="nightline"></div>
</div>

/* Mirror of the persona registry's sprite maps (services/character-engine/src/persona-registry.ts).
   The caption shows exactly what the service tells the client to play. */
const SPRITES = {
  troublemaker:{idle:"bob",plotting:"rub-hands",tada:"confetti-jump",wink:"wink",thinking:"tap-chin",mischief:"eyebrow-wiggle",smug:"lean-back",cheer:"fist-pump"},
  momo:{idle:"star-boing",plotting:"star-charge",tada:"confetti-pop",wink:"wink",thinking:"star-dim",mischief:"waddle-wiggle",smug:"chin-up",cheer:"double-bounce"},
  pip:{idle:"slow-blink",plotting:"head-tilt",tada:"wing-flap",wink:"one-eye",thinking:"wide-eyes",mischief:"sideways-look",smug:"feather-fluff",cheer:"hoot-bounce"},
  lumi:{idle:"glow-pulse",plotting:"glow-flicker",tada:"full-shine",wink:"wink",thinking:"dim-hover",mischief:"zigzag-dart",smug:"steady-glow",cheer:"light-burst"},
  boo:{idle:"float",plotting:"peek-around",tada:"sparkler-wave",wink:"wink",thinking:"hover-tilt",mischief:"vanish-reappear",smug:"slow-spin",cheer:"loop-de-loop"},
  dizzy:{idle:"sparkle-orbit",plotting:"slow-spin",tada:"strobe-burst",wink:"facet-flash",thinking:"dim-spin",mischief:"wobble",smug:"shine-on",cheer:"spin-up"},
  koko:{idle:"tail-sway",plotting:"tail-question",tada:"banana-toss",wink:"wink",thinking:"head-scratch",mischief:"ear-waggle",smug:"arms-crossed",cheer:"swing-jump"},
};
const NAMES = {troublemaker:"Sparky",momo:"Momo",pip:"Pip",lumi:"Lumi",boo:"Boo",dizzy:"Dizzy",koko:"Koko"};
const MOODS = ["idle","plotting","tada","wink","thinking","mischief","smug","cheer"];

const stage=document.getElementById("stage"), picker=document.getElementById("picker"),
      moods=document.getElementById("moods"), caption=document.getElementById("caption"),
      fx=document.getElementById("fx"), nightline=document.getElementById("nightline");

let currentChar="momo", currentMood="idle", nightTimer=null;

/* build stage rigs + picker thumbs (same rig, small) */
for (const id of Object.keys(RIGS)){
  stage.insertAdjacentHTML("beforeend", RIGS[id]);
  const b=document.createElement("button"); b.className="pick"; b.dataset.id=id;
  b.innerHTML = RIGS[id].replace('class="rig','class="thumb') + `<div class="nm">${NAMES[id]}</div>`;
  b.onclick=()=>setChar(id);
  picker.appendChild(b);
}
/* confetti pieces */
const CONF=["#FF6F61","#FFC24B","#F6ECD9","#FF8A7B"];
for(let i=0;i<16;i++){const c=document.createElement("div");c.className="confetti";
  c.style.left=(20+Math.random()*60)+"%"; c.style.background=CONF[i%4];
  c.style.setProperty("--dx",(Math.random()*160-80)+"px"); c.style.animationDelay=(Math.random()*0.9)+"s";
  fx.appendChild(c);}

/* mood buttons */
for(const m of MOODS){const b=document.createElement("button");b.className="mood";b.textContent=m;b.dataset.m=m;
  b.onclick=()=>{stopNight();setMood(m)};moods.appendChild(b);}

function setChar(id){
  currentChar=id;
  document.querySelectorAll(".rig").forEach(r=>r.classList.toggle("show", r.classList.contains("char-"+id)));
  document.querySelectorAll(".pick").forEach(p=>p.classList.toggle("on", p.dataset.id===id));
  setMood(currentMood);
}
function setMood(m){
  currentMood=m;
  const wrap=document.querySelector(".stagewrap");
  wrap.className="stagewrap m-"+m;
  document.querySelectorAll(".mood").forEach(b=>b.classList.toggle("on", b.dataset.m===m));
  caption.innerHTML=`persona <code>${currentChar}</code> · mood <code>${m}</code> → plays <code>${SPRITES[currentChar][m]}</code>`;
}
const NIGHT=[["idle","A quiet Thursday. Someone types “we doing something Saturday?”"],
  ["plotting","Spark received. ${n} is cooking three plans…"],
  ["thinking","The crew is voting. ${n} reads the room."],
  ["tada","It’s a tie — the Wheel spins — WE HAVE A WINNER!"],
  ["cheer","Everybody’s in. Out the door. ${n} did it again."]];
document.getElementById("playNight").onclick=()=>{
  stopNight(); let i=0;
  const step=()=>{ if(i>=NIGHT.length){nightline.textContent="";return;}
    const [m,line]=NIGHT[i++]; setMood(m);
    nightline.textContent=line.replaceAll("${n}",NAMES[currentChar]);
    nightTimer=setTimeout(step, 2600); };
  step();
};
function stopNight(){ if(nightTimer){clearTimeout(nightTimer);nightTimer=null;nightline.textContent="";} }

setChar("momo");
</script>
