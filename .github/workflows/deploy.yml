name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# deploys are serialized; never cancel one mid-flight
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/funtog

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/pkgs/container/funtog
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the pushed image
        run: |
          docker run -d --name funtog -p 3000:3000 ${{ env.IMAGE }}:latest
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:3000/healthz; then healthy=1; break; fi
            sleep 2
          done
          if [ -z "$healthy" ]; then echo "server never became healthy"; docker logs funtog; exit 1; fi
          # main functionality: the plans API must return non-empty plan candidates
          plans=$(curl -fsS "http://127.0.0.1:3000/api/plans?vibe=smoke%20test" | python3 -c "import json,sys; print(len(json.load(sys.stdin)['plans']))")
          echo "plans returned: $plans"
          [ "$plans" -ge 1 ] || { echo "plans API returned no plans"; docker logs funtog; exit 1; }
