name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# a newer push to the same ref cancels the in-flight run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # no package-lock.json yet, so `npm install` (not `npm ci`). Commit a lockfile to enable `npm ci`.
      - run: npm install --no-audit --no-fund
      # root script fans out: `npm test --workspaces` → contract + unit tests for all six subsystems
      # + the harness self-test. Tests run through tsx; there is no build step by design.
      - run: npm test

  # NOTE (Phase 2): a strict typecheck job can be added once per-package tsconfigs + @types/node land:
  #   - run: npx tsc --noEmit
  # It is intentionally omitted today so CI reflects only what is genuinely green (the 51-test suite).
